backend:
  name: git-gateway
  repo: lhx73421530-design/nept-pro-global  # <--- 换成你的 GitHub 名字/仓库名
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "products"
    label: "Product Management (发布产品)"
    folder: "content/products"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Sweepers", "Mowers", "Tools"] }
      - { label: "Main Image", name: "image", widget: "image" }
      - { label: "Description", name: "body", widget: "markdown" }