backend:
  name: git-gateway
  # 明确指向 Netlify 的网关地址，解决 "Unable to access identity settings"
  identity_url: "https://magenta-cucurucho-59a5ea.netlify.app/.netlify/identity"
  gateway_url: "https://magenta-cucurucho-59a5ea.netlify.app/.netlify/git"
  repo: lhx73421530-design/nept-pro-global  # 已检索您的用户名和仓库名
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "products"
    label: "Product Management (发布产品)"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Model Number", name: "model", widget: "string" }
      - { label: "Sub Category", name: "sub_category", widget: "select", options: ["Ride-on Sweepers", "Floor Scrubbers", "RC Mowers", "Brush Cutters", "Chain Saws", "Lithium-Ion Series"] }
      - { label: "Main Image", name: "image", widget: "image" }
      - { label: "Body Content", name: "body", widget: "markdown" }