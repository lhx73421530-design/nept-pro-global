backend:
  name: git-gateway
  repo: lhx73421530-design/nept-pro-global  # <--- 必须是你的 GitHub 名字/仓库名
  branch: main

# 图片存放路径（后台传图会直接进这里）
media_folder: "images"
public_folder: "images"

collections:
  - name: "products"
    label: "Product Management (发布产品)"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Main Category", name: "main_category", widget: "select", options: ["Cleaning Tools", "Garden Tools", "Power Tools"] }
      - { label: "Sub Category", name: "sub_category", widget: "select", options: ["Ride-on Sweepers", "Floor Scrubbers", "RC Mowers", "Brush Cutters", "Chain Saws", "Lithium-Ion Series"] }
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Model Number", name: "model", widget: "string" }
      - { label: "Price (Optional)", name: "price", widget: "string", required: false } # 设为非必填
      - { label: "Main Image", name: "image", widget: "image" }
      - { label: "Detailed Description", name: "body", widget: "markdown" }