<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNNEPT PRO - ADMIN PANEL</title>
  <!-- 1. 加载 Netlify 身份验证脚本 -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // ！！！极其重要：检索到的 Netlify 站点地址 ！！！
    // 你的 Netlify 项目名为：magenta-cucurucho-59a5ea
    const NETLIFY_URL = "https://magenta-cucurucho-59a5ea.netlify.app"; 

    // 强行告诉后台：去 Netlify 验证身份，不要在 Vercel 找
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            // 登录成功后刷新页面进入后台
            document.location.href = "/admin/";
          });
        }
      });
      // 关键指令：将验证地址指向 Netlify
      window.netlifyIdentity.seturl(NETLIFY_URL);
    }
  </script>
  
  <!-- 2. 加载后台管理引擎 (Decap CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
</body>
</html>
