<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNNEPT PRO - ADMIN</title>
  <!-- 1. 加载验证脚本 -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // 你的 Netlify 真实地址
    const NETLIFY_URL = "https://magenta-cucurucho-59a5ea.netlify.app";

    // 关键动作：彻底清理浏览器旧缓存，防止指向 Vercel
    localStorage.removeItem("netlifySiteURL");
    localStorage.setItem("netlifySiteURL", NETLIFY_URL);

    // 强行重定向锁孔位置
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
      // 告诉程序：无论你在哪，去 Netlify 拿钥匙
      window.netlifyIdentity.seturl(NETLIFY_URL);
    }
  </script>
  <!-- 2. 加载后台引擎 -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
</body>
</html>
