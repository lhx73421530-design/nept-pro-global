<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CNNEPT PRO | Official Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
    <nav class="p-10 border-b border-orange-600/30 flex justify-between">
        <div class="text-xl font-black">CNNEPT PRO</div>
        <a href="https://wa.me/8613561675079" class="text-orange-500 font-bold uppercase">B2B Inquiry</a>
    </nav>
    <main class="h-screen flex flex-col items-center justify-center text-center">
        <h1 class="text-7xl font-black italic uppercase">Industrial Power</h1>
        <p class="mt-6 text-zinc-500 tracking-[0.5em]">LATEST SOLUTIONS LIVE</p>
        
        <!-- 自动显示后台发布的产品 -->
        <div class="grid grid-cols-2 gap-10 mt-20">
            {{ range (where .Site.RegularPages "Section" "products") }}
            <a href="{{ .RelPermalink }}" class="border border-zinc-800 p-6 rounded-2xl">
                <img src="{{ .Params.image }}" class="w-40 h-40 object-cover mb-4">
                <h3 class="font-bold">{{ .Title }}</h3>
                <p class="text-orange-500">${{ .Params.price }}</p>
            </a>
            {{ end }}
        </div>
    </main>
</body>
</html>
