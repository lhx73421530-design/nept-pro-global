<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }} | CNNEPT PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10 md:p-20">
    <nav class="mb-20"><a href="/" class="text-zinc-500 uppercase font-bold text-xs">← Back to Fleet</a></nav>
    
    <div class="grid md:grid-cols-2 gap-20 max-w-7xl mx-auto">
        <img src="{{ .Params.image }}" class="rounded-3xl border border-white/10 shadow-2xl">
        <div>
            <h1 class="text-6xl font-black uppercase italic mb-6 leading-tight">{{ .Title }}</h1>
            <div class="text-3xl font-black text-orange-500 mb-10">${{ .Params.price }}</div>
            
            <div class="space-y-4 border-t border-white/10 pt-10">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-zinc-500 uppercase text-xs">Category</span>
                    <span class="font-bold">{{ .Params.sub_category }}</span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-zinc-500 uppercase text-xs">Model</span>
                    <span class="font-bold">{{ .Params.model }}</span>
                </div>
            </div>
            
            <a href="https://wa.me/8613561675079" class="block mt-12 bg-white text-black text-center py-5 font-black uppercase rounded-full">WhatsApp Order</a>
        </div>
    </div>
</body>
</html>
