<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNNEPT PRO - ADMIN</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // ！！！这里填入你 Netlify 的完整二级域名 ！！！
    const NETLIFY_URL = "https://comforting-pie-8af589.netlify.app";

    // 强行注入配置，防止 CMS 去找 Vercel 自己的路径
    window.addEventListener('load', () => {
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
        // 强制设置 API 地址
        window.netlifyIdentity.seturl(NETLIFY_URL);
      }
    });
  </script>
  <!-- 加载后台引擎 -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
</body>
</html>
