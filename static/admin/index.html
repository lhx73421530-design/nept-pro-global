<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CNNEPT PRO - Admin</title>
  <!-- 1. 加载身份验证组件 -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // ！！！极其重要：请把下面这一行换成你真实的 Netlify 网址 ！！！
    // 示例：const NETLIFY_URL = "https://your-site-name-12345.netlify.app";
    const NETLIFY_URL = "https://radiant-torrone-dd4cb0.netlify.app/"; 

    // 强制初始化验证地址，防止找不到锁孔
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
      // 核心指令：告诉后台去 Netlify 验证身份
      window.netlifyIdentity.seturl(NETLIFY_URL);
    }
  </script>
  
  <!-- 2. 加载后台管理引擎 -->
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
</body>
</html>
