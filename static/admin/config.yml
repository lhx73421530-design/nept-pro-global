backend:
  name: github
  repo: lhx73421530-design/nept-pro-global  # <--- 请务必改为：你的名字/仓库名
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: /auth

# 媒体文件：后台传的图存在 static 文件夹，但在网页里通过 /images 访问
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Product List (发布产品)"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Price ($)", name: "price", widget: "string" }
      - { label: "Model Number", name: "model", widget: "string" }
      - { label: "Main Image", name: "image", widget: "image" }
      - { label: "Details", name: "body", widget: "markdown" }