backend:
  name: git-gateway
  # ！！！这里填入你 Netlify 的完整二级域名（必须带 https://） ！！！
  # 示例：https://shiny-glitter-12345.netlify.app
  identity_url: "https://comforting-pie-8af589.netlify.app/.netlify/identity""
  gateway_url: "https://comforting-pie-8af589.netlify.app/.netlify/git"
  repo: lhx73421530-design/nept-pro-global
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Product Management (发布产品)"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Price ($)", name: "price", widget: "string" }
      - { label: "Model Number", name: "model", widget: "string" }
      - { label: "Sub Category", name: "sub_category", widget: "select", options: ["Ride-on Sweepers", "Floor Scrubbers", "RC Mowers", "Brush Cutters", "Chain Saws", "Lithium-Ion Series"] }
      - { label: "Main Image", name: "image", widget: "image" }
      - { label: "Body Content", name: "body", widget: "markdown" }